<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Payment Verification</title>
    <meta name="robots" content="noindex, nofollow" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="mx-auto max-w-6xl px-4 pb-12 pt-10 sm:px-6">
      <h1 class="text-4xl font-bold">Admin Payment Verification</h1>
      <p class="mt-2 text-sm text-slate-600">Enter admin token to review uploaded proofs and approve/reject payments.</p>

      <section class="mt-6 rounded-2xl bg-white p-5 shadow">
        <div class="grid gap-4 md:grid-cols-3">
          <label class="text-sm font-medium text-slate-700 md:col-span-2"
            >Admin Verify Token
            <input id="tokenInput" type="password" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" placeholder="Enter x-admin-token value" />
          </label>
          <label class="text-sm font-medium text-slate-700"
            >Verifier Name
            <input id="verifierInput" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" value="admin" />
          </label>
        </div>

        <div class="mt-4 flex flex-wrap gap-3">
          <button id="saveTokenBtn" class="rounded-full bg-teal-700 px-5 py-2 text-sm font-semibold text-white hover:bg-teal-800">Save Token</button>
          <button id="loadBtn" class="rounded-full border border-teal-700 px-5 py-2 text-sm font-semibold text-teal-700 hover:bg-teal-50">Load Registrations</button>
        </div>
      </section>

      <section class="mt-6">
        <div id="listWrap" class="grid gap-4"></div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/common.js"></script>
    <script>
      const tokenInput = document.getElementById('tokenInput');
      const verifierInput = document.getElementById('verifierInput');
      const saveTokenBtn = document.getElementById('saveTokenBtn');
      const loadBtn = document.getElementById('loadBtn');
      const listWrap = document.getElementById('listWrap');

      function getAdminToken() {
        return tokenInput.value.trim() || localStorage.getItem('adminVerifyToken') || '';
      }

      function sortByPriority(items) {
        const map = { proof_submitted: 1, pending: 2, rejected: 3, paid: 4, refunded: 5 };
        return items.sort((a, b) => (map[a.payment_status] || 99) - (map[b.payment_status] || 99));
      }

      function statusBadge(status) {
        const s = String(status || '').toLowerCase();
        if (s === 'paid') return 'bg-emerald-100 text-emerald-700';
        if (s === 'proof_submitted') return 'bg-amber-100 text-amber-700';
        if (s === 'rejected') return 'bg-red-100 text-red-700';
        return 'bg-slate-100 text-slate-700';
      }

      function cardHtml(row) {
        return `
          <article class="rounded-2xl bg-white p-5 shadow">
            <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
              <p class="text-sm font-semibold text-slate-500">Trainee #${row.id}</p>
              <span class="rounded-full px-3 py-1 text-xs font-semibold ${statusBadge(row.payment_status)}">${row.payment_status}</span>
            </div>
            <div class="grid gap-2 text-sm text-slate-700 md:grid-cols-2">
              <p><strong>Name:</strong> ${row.full_name}</p>
              <p><strong>Email:</strong> ${row.email}</p>
              <p><strong>Phone:</strong> ${row.phone}</p>
              <p><strong>Program:</strong> ${row.program_name}</p>
              <p><strong>Amount:</strong> ${row.currency} ${Number(row.amount_paid).toFixed(2)}</p>
              <p><strong>Txn ID:</strong> ${row.manual_txn_id || 'NA'}</p>
              <p><strong>Receipt:</strong> ${row.receipt_number || 'Not generated yet'}</p>
              <p><strong>Registered:</strong> ${new Date(row.registered_at).toLocaleString()}</p>
            </div>
            <div class="mt-3">
              <a class="text-sm font-semibold text-teal-700 underline" href="${row.payment_proof_path ? `${window.APP_CONFIG.API_BASE_URL}${row.payment_proof_path}` : '#'}" target="_blank" rel="noopener">
                ${row.payment_proof_path ? 'Open Payment Proof' : 'No proof uploaded'}
              </a>
            </div>
            <div class="mt-4 flex flex-wrap gap-2">
              <button data-action="approve" data-id="${row.id}" class="rounded-full bg-emerald-600 px-4 py-2 text-xs font-semibold text-white hover:bg-emerald-700">Approve</button>
              <button data-action="reject" data-id="${row.id}" class="rounded-full bg-red-600 px-4 py-2 text-xs font-semibold text-white hover:bg-red-700">Reject</button>
            </div>
          </article>
        `;
      }

      async function loadRows() {
        const token = getAdminToken();
        if (!token) {
          showToast('Enter admin token first', 'error');
          return;
        }

        try {
          const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/api/trainees?limit=200`, {
            headers: { 'x-admin-token': token }
          });
          const json = await response.json();

          if (!response.ok || !json.ok) {
            throw new Error(json.message || 'Unable to load trainees');
          }

          const rows = sortByPriority(json.data || []);
          listWrap.innerHTML = rows.length ? rows.map(cardHtml).join('') : '<p class="rounded-2xl bg-white p-5 text-sm text-slate-600 shadow">No registrations found.</p>';
          showToast('Admin data loaded', 'success');
        } catch (error) {
          showToast(error.message || 'Failed to load admin data', 'error');
        }
      }

      async function verifyRow(id, isApproved) {
        const token = getAdminToken();
        const verifierName = verifierInput.value.trim() || 'admin';

        if (!token) {
          showToast('Admin token is required', 'error');
          return;
        }

        try {
          const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/api/admin/verify-payment/${id}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'x-admin-token': token
            },
            body: JSON.stringify({ isApproved, verifierName })
          });

          const json = await response.json();
          if (!response.ok || !json.ok) {
            throw new Error(json.message || 'Verification failed');
          }

          showToast(isApproved ? 'Payment approved' : 'Payment rejected', 'success');
          await loadRows();
        } catch (error) {
          showToast(error.message || 'Admin action failed', 'error');
        }
      }

      saveTokenBtn.addEventListener('click', () => {
        const token = tokenInput.value.trim();
        if (!token) {
          showToast('Enter token before saving', 'error');
          return;
        }

        localStorage.setItem('adminVerifyToken', token);
        showToast('Admin token saved in this browser', 'success');
      });

      loadBtn.addEventListener('click', loadRows);

      listWrap.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const id = button.getAttribute('data-id');
        const action = button.getAttribute('data-action');
        verifyRow(id, action === 'approve');
      });

      const savedToken = localStorage.getItem('adminVerifyToken');
      if (savedToken) {
        tokenInput.value = savedToken;
      }
    </script>
  </body>
</html>
