<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Success | Dr. Ananya Rao</title>
    <meta name="description" content="Registration successful. View and download your payment receipt." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <main class="mx-auto max-w-3xl px-4 pb-12 pt-12 sm:px-6">
      <section class="rounded-3xl bg-white p-6 shadow-lg sm:p-8">
        <p class="inline-block rounded-full bg-teal-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-teal-700">Payment Verified</p>
        <h1 class="mt-3 text-4xl font-bold">Registration Successful</h1>
        <p class="mt-2 text-slate-700">Your trainee registration has been confirmed.</p>

        <div id="receiptCard" class="mt-6 grid gap-3 rounded-2xl bg-slate-50 p-5 text-sm text-slate-700"></div>

        <div class="mt-6 flex flex-wrap gap-3">
          <button id="downloadPdfBtn" class="rounded-full bg-teal-700 px-6 py-3 text-sm font-semibold text-white hover:bg-teal-800">
            Download PDF Receipt
          </button>
          <a href="index.html" class="rounded-full border border-teal-700 px-6 py-3 text-sm font-semibold text-teal-700 hover:bg-teal-50">Back to Home</a>
        </div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/common.js"></script>
    <script>
      const receiptCard = document.getElementById('receiptCard');
      const downloadPdfBtn = document.getElementById('downloadPdfBtn');
      let receiptData = null;

      function renderReceipt(data) {
        receiptCard.innerHTML = `
          <p><strong>Receipt No:</strong> ${data.receipt_number}</p>
          <p><strong>Name:</strong> ${data.full_name}</p>
          <p><strong>Email:</strong> ${data.email}</p>
          <p><strong>Phone:</strong> ${data.phone}</p>
          <p><strong>Program:</strong> ${data.program_name}</p>
          <p><strong>Amount:</strong> ${data.currency} ${Number(data.amount_paid).toFixed(2)}</p>
          <p><strong>Transaction ID:</strong> ${data.razorpay_payment_id}</p>
          <p><strong>Registered On:</strong> ${new Date(data.registered_at).toLocaleString()}</p>
        `;
      }

      function generatePdfReceipt(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text('Counseling Registration Receipt', 20, 20);

        doc.setFontSize(11);
        const lines = [
          `Receipt Number: ${data.receipt_number}`,
          `Name: ${data.full_name}`,
          `Email: ${data.email}`,
          `Phone: ${data.phone}`,
          `Program: ${data.program_name}`,
          `Amount Paid: ${data.currency} ${Number(data.amount_paid).toFixed(2)}`,
          `Transaction ID: ${data.razorpay_payment_id}`,
          `Payment Status: ${data.payment_status}`,
          `Date: ${new Date(data.registered_at).toLocaleString()}`
        ];

        let y = 35;
        lines.forEach((line) => {
          doc.text(line, 20, y);
          y += 8;
        });

        doc.save(`receipt-${data.receipt_number}.pdf`);
      }

      async function loadTraineeData() {
        const params = new URLSearchParams(window.location.search);
        const traineeId = params.get('traineeId');

        if (!traineeId) {
          showToast('Missing trainee id', 'error');
          return;
        }

        try {
          const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/api/trainees/${traineeId}`);
          const json = await response.json();

          if (!response.ok || !json.ok) {
            throw new Error(json.message || 'Unable to load receipt details');
          }

          receiptData = json.data;
          renderReceipt(receiptData);

          // Auto-generate once on successful page load as requested.
          generatePdfReceipt(receiptData);
          showToast('Receipt loaded successfully', 'success');
        } catch (error) {
          showToast(error.message || 'Could not load receipt', 'error');
        }
      }

      downloadPdfBtn.addEventListener('click', () => {
        if (!receiptData) {
          showToast('Receipt details not available yet', 'error');
          return;
        }

        generatePdfReceipt(receiptData);
      });

      loadTraineeData();
    </script>
  </body>
</html>
